name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # lint 门禁（issue #83）：规则集 + line-length 锁在 pyproject [tool.ruff]，CI 只负责
  # 跑。独立 job 而非塞进 python-unit 矩阵——lint 与 OS/Python 版本无关，跑一次即可。
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.6"

      - name: ruff check
        run: ruff check .

  # 渲染版 skill 防漂移（issue #128）：.claude/skills/godot-cli-control/ 整目录
  # 是 skills_install.skill_files() 的渲染副本（供在本仓工作的 agent 加载），
  # 「改模板后手动重渲染」靠人记已被证明不可靠——v0.1.6 起漂移一个多月，
  # PR #126 才追平 ~1300 行。这里重渲染后整目录 diff，SKILL.md 版本行归一化
  # （hatch-vcs dev 版本号每个 commit 都变，不归一化永远红）。
  # 旧版曾钉死 COLUMNS=80 + Python 3.12（argparse help 注入随折行漂移）；
  # {{cli_help}} 注入已删，渲染结果与终端宽度 / Python 小版本无关。
  skill-render-drift:
    name: skill-render-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # hatch-vcs 需要 tags 解析版本

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Re-render and diff (version line normalized)
        run: |
          python -m godot_cli_control.skills_install /tmp/rendered-skill
          NORM='s/^Generated from godot-cli-control v.* Re-run/Generated from godot-cli-control vNORMALIZED. Re-run/'
          cp -R .claude/skills/godot-cli-control /tmp/committed-skill
          sed -E -i "$NORM" /tmp/rendered-skill/SKILL.md /tmp/committed-skill/SKILL.md
          if ! diff -ru /tmp/committed-skill /tmp/rendered-skill; then
            echo "::error::仓内渲染版 skill 与模板不同步（上方 diff 中 - 为仓内、+ 为最新渲染）。修复：在仓库根跑 python -m godot_cli_control.skills_install 后提交 .claude/skills/godot-cli-control/ 的变更。"
            exit 1
          fi
          echo "rendered skill dir is in sync"

  python-unit:
    name: pytest (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      GODOT_VERSION: '4.6.2-stable'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        include:
          # 跨平台 daemon / pathing 验证：Windows + macOS 跑一份 3.12 即可,
          # 不再扩成全 python × 全 os 的 12 格 matrix。
          - os: windows-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.12'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # hatch-vcs 需要 tags 解析版本

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      # ---- Godot for headless e2e (issue #84) -----------------------------
      # 仅 ubuntu+3.12（覆盖率门禁所在格）下装 Godot，让 headless e2e
      # （test_e2e_input / test_e2e_example / test_e2e_client_direct）在 CI 真跑
      # 并计入覆盖率。装了 godot ⇒ find_godot_binary() 命中 ⇒ 这些文件不再 skip。
      # 其余 python 版本格仍走纯 unit（无 GODOT_BIN ⇒ e2e 自动 skip），不重复下载。
      # 复用 walkthrough job 的下载逻辑；headless 不需要 display，普通 runner 即可。
      - name: Cache Godot (Linux, e2e)
        id: godot-cache-e2e
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/cache@v5
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}-linux-x86_64

      - name: Download Godot (Linux, e2e)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && steps.godot-cache-e2e.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          VER="${GODOT_VERSION}"
          URL="https://github.com/godotengine/godot/releases/download/${VER}/Godot_v${VER}_linux.x86_64.zip"
          echo "Downloading $URL"
          curl -fsSL -o /tmp/godot.zip "$URL"
          unzip -q /tmp/godot.zip -d ~/godot-bin
          mv ~/godot-bin/Godot_v${VER}_linux.x86_64 ~/godot-bin/godot
          chmod +x ~/godot-bin/godot

      - name: Expose GODOT_BIN for e2e (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          ~/godot-bin/godot --version
          echo "GODOT_BIN=$HOME/godot-bin/godot" >> "$GITHUB_ENV"

      # 用 `coverage run` 而非 `pytest --cov`：pytest 启动时
      # pytest11 entry-point 会自动加载 godot_cli_control.pytest_plugin，
      # 这会先于 pytest-cov import bridge/daemon/client，让 import-time 语句
      # 全部 miss。`coverage run` 在 Python 启动时就开 trace，无时序坑。
      - name: Run unit tests with coverage
        run: |
          coverage run -m pytest python/tests/ -v
          coverage report

      # 仅在 ubuntu+3.12 这一格执行覆盖率门禁 + 上传 xml。
      # 别的 OS / Python 版本路径分支不同（Windows daemon_is_godot 走 tasklist
      # 而非 ps），直接卡 80% 会因平台差异误红。
      - name: Coverage fail-under (ubuntu+3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: coverage report --fail-under=80

      - name: Export coverage XML
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: coverage xml

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  walkthrough:
    name: fresh-clone walkthrough (${{ matrix.os }} / Godot ${{ matrix.godot-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        godot-version: ['4.6.2-stable']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # ---- Linux Godot ----------------------------------------------------
      - name: Cache Godot (Linux)
        id: godot-cache-linux
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v5
        with:
          path: ~/godot-bin
          key: godot-${{ matrix.godot-version }}-linux-x86_64

      - name: Download Godot (Linux)
        if: matrix.os == 'ubuntu-latest' && steps.godot-cache-linux.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          VER="${{ matrix.godot-version }}"
          URL="https://github.com/godotengine/godot/releases/download/${VER}/Godot_v${VER}_linux.x86_64.zip"
          echo "Downloading $URL"
          curl -fsSL -o /tmp/godot.zip "$URL"
          unzip -q /tmp/godot.zip -d ~/godot-bin
          mv ~/godot-bin/Godot_v${VER}_linux.x86_64 ~/godot-bin/godot
          chmod +x ~/godot-bin/godot

      - name: Verify Godot (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: ~/godot-bin/godot --version

      # ---- Windows Godot --------------------------------------------------
      - name: Cache Godot (Windows)
        id: godot-cache-windows
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}\godot-bin
          key: godot-${{ matrix.godot-version }}-windows-x86_64

      - name: Download Godot (Windows)
        if: matrix.os == 'windows-latest' && steps.godot-cache-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $VER = "${{ matrix.godot-version }}"
          $URL = "https://github.com/godotengine/godot/releases/download/${VER}/Godot_v${VER}_win64.exe.zip"
          Write-Host "Downloading $URL"
          $tmpZip = Join-Path $env:RUNNER_TEMP 'godot.zip'
          Invoke-WebRequest -Uri $URL -OutFile $tmpZip
          $dest = Join-Path $env:GITHUB_WORKSPACE 'godot-bin'
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Expand-Archive -Path $tmpZip -DestinationPath $dest -Force
          # 不重命名 exe —— Godot Windows 通过 exe stem 找 *_console.exe
          # 包装器，改名（如 godot.exe）会触发 "Invalid wrapper executable name."

      - name: Resolve Godot exe path (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dest = Join-Path $env:GITHUB_WORKSPACE 'godot-bin'
          $exe = Get-ChildItem -Path $dest -Filter 'Godot_*_win64.exe' |
            Where-Object { $_.Name -notlike '*_console.exe' } |
            Select-Object -First 1
          if (-not $exe) { throw "找不到 Godot _win64.exe（dest=$dest）" }
          "GODOT_BIN=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "GODOT_BIN=$($exe.FullName)"

      - name: Verify Godot (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          & $env:GODOT_BIN --version

      # ---- bash shim walkthrough（仅 Linux —— PowerShell 等价 walkthrough 待跟进） ----
      - name: Run walkthrough (bash shim path, Linux only)
        if: matrix.os == 'ubuntu-latest'
        env:
          GODOT_BIN: /home/runner/godot-bin/godot
        run: ./addons/godot_cli_control/tests/test_walkthrough.sh

      # ---- init walkthrough（跨平台 Python 版） --------------------------------
      - name: Run walkthrough (godot-cli-control init path, Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GODOT_BIN: /home/runner/godot-bin/godot
        run: python addons/godot_cli_control/tests/test_init_walkthrough.py

      - name: Run walkthrough (godot-cli-control init path, Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        # GODOT_BIN 由前面 Resolve Godot exe path step 写到 $GITHUB_ENV
        run: python addons/godot_cli_control/tests/test_init_walkthrough.py

      # ---- GUT unit tests (跨平台 Python runner run_gut.py, issue #36) ----
      # run_gut.py 是纯 stdlib（不 import godot_cli_control），只需 python + git，
      # 无需 pip install。macOS 格的 GUT 在 gui-screenshot-e2e job 里跑（复用那边
      # 已下载的 macOS Godot，免重复下载）。
      - name: Run GUT unit tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GODOT_BIN: /home/runner/godot-bin/godot
        run: python addons/godot_cli_control/tests/run_gut.py

      - name: Run GUT unit tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        # GODOT_BIN 由前面 Resolve Godot exe path step 写到 $GITHUB_ENV
        run: python addons/godot_cli_control/tests/run_gut.py

  # windowed screenshot e2e（issue #64）：GUT / 普通 e2e 全跑 --headless，dummy
  # renderer 拿不到 viewport texture，frame_post_draw 这条「真实用户用 screenshot」
  # 的分支长期零覆盖（#61 即此类 silent regression）。这里用 macOS runner（真 GPU /
  # 能开窗，无需 xvfb 赌软渲染）真起 GUI daemon、立刻截图，覆盖 windowed 路径。
  gui-screenshot-e2e:
    name: macOS e2e — windowed screenshot + GUT (Godot ${{ matrix.godot-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        godot-version: ['4.6.2-stable']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Cache Godot (macOS)
        id: godot-cache-macos
        uses: actions/cache@v5
        with:
          path: ~/godot-bin
          key: godot-${{ matrix.godot-version }}-macos-universal

      - name: Download Godot (macOS)
        if: steps.godot-cache-macos.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          VER="${{ matrix.godot-version }}"
          URL="https://github.com/godotengine/godot/releases/download/${VER}/Godot_v${VER}_macos.universal.zip"
          echo "Downloading $URL"
          curl -fsSL -o /tmp/godot.zip "$URL"
          unzip -q /tmp/godot.zip -d ~/godot-bin

      - name: Resolve Godot binary (macOS)
        run: |
          BIN="$HOME/godot-bin/Godot.app/Contents/MacOS/Godot"
          if [ ! -x "$BIN" ]; then
            echo "找不到 Godot 可执行：$BIN"; ls -R ~/godot-bin; exit 1
          fi
          echo "GODOT_BIN=$BIN" >> "$GITHUB_ENV"

      - name: Verify Godot (macOS)
        run: |
          "$GODOT_BIN" --version

      # GCC_GUI_E2E=1 解锁 test_e2e_screenshot_gui.py 的默认 skip；--gui daemon
      # 在 macOS runner 的窗口会话里真开窗。
      - name: Run windowed screenshot e2e
        env:
          GCC_GUI_E2E: '1'
        run: python -m pytest python/tests/test_e2e_screenshot_gui.py -v

      # macOS 格的 GUT 在此跑（issue #36 三平台覆盖的第三格），复用上面下载的
      # macOS Godot，免在 walkthrough job 再加一套 macOS Godot 下载步骤。
      - name: Run GUT unit tests (macOS)
        run: python addons/godot_cli_control/tests/run_gut.py

      # 输入持续性 e2e（#70）：起真 headless daemon，过去因没有任何 CI job 同时
      # 备齐 GODOT_BIN + 已装包 + pytest 而从未在 CI 真跑过（python-unit 不设
      # GODOT_BIN ⇒ skip；walkthrough 不跑 pytest）。本 job 三者齐全，顺手让它
      # 首次进 CI。headless，无需开窗。
      - name: Run input-persistence e2e (headless)
        run: python -m pytest python/tests/test_e2e_input.py -v

      # demo 防腐 e2e（examples/platformer-demo）：headless 起 daemon，跑 demo 的
      # 核心驱动序列并断言黑盒属性（jump_count==1、moved_right==true）。复用本 job
      # 已备齐的 GODOT_BIN + 已装包 + pytest。场景节点路径 / CLI 子命令 / player.gd
      # 属性名一旦回归，这一步立刻红 —— 仓库自带 demo 不许悄悄腐烂。
      - name: Run example demo e2e (headless)
        run: python -m pytest python/tests/test_e2e_example.py -v

      # 录屏 e2e（#78）：本 job 是唯一同时备齐「真实显示 + GODOT_BIN + ffmpeg」的格，
      # 录制必须开窗（headless dummy renderer 写帧 SIGSEGV，正是 #180 根因），
      # 所以只能在这里跑。先确保 ffmpeg/ffprobe 在 PATH（缺则 test 自身 skip 并打印原因）。
      - name: Ensure ffmpeg (macOS)
        run: ffmpeg -version >/dev/null 2>&1 && ffprobe -version >/dev/null 2>&1 || brew install ffmpeg

      - name: Run record e2e (windowed --record → mp4)
        env:
          GCC_GUI_E2E: '1'
        run: python -m pytest python/tests/test_e2e_record.py -v

  # 聚合门禁（issue #127）：branch protection 的 required status check 只锚定
  # 这一个稳定名字。矩阵格的 check 名携带 OS / Python / Godot 版本（如
  # "pytest (Python 3.12 / macos-latest)"），矩阵一改名字就变，required
  # contexts 失配后 PR 会永远等一个不再上报的 check；聚合 job 名永不变。
  # if: always() + 显式失败是必须的：依赖 job 失败时本 job 若被 skip，
  # GitHub 把 skipped 的 required check 当满足处理，门禁形同虚设。
  ci-ok:
    name: ci-ok
    if: always()
    needs: [lint, skill-render-drift, python-unit, walkthrough, gui-screenshot-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any needed job did not succeed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: |
          echo "某个前置 job 不是 success（见 PR checks 列表）"
          exit 1

      - name: All green
        run: echo "ci-ok"
