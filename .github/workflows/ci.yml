name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-unit:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # hatch-vcs 需要 tags 解析版本

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package + test deps
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Run unit tests
        working-directory: python
        run: pytest tests/ -v

  walkthrough:
    name: fresh-clone walkthrough (Godot ${{ matrix.godot-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        godot-version: ['4.5-stable']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Godot binary
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ matrix.godot-version }}-linux-x86_64

      - name: Download Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          VER="${{ matrix.godot-version }}"
          URL="https://github.com/godotengine/godot/releases/download/${VER}/Godot_v${VER}_linux.x86_64.zip"
          echo "Downloading $URL"
          curl -fsSL -o /tmp/godot.zip "$URL"
          unzip -q /tmp/godot.zip -d ~/godot-bin
          mv ~/godot-bin/Godot_v${VER}_linux.x86_64 ~/godot-bin/godot
          chmod +x ~/godot-bin/godot

      - name: Verify Godot
        run: ~/godot-bin/godot --version

      - name: Run walkthrough
        env:
          GODOT_BIN: /home/runner/godot-bin/godot
        run: ./addons/godot_cli_control/tests/test_walkthrough.sh
