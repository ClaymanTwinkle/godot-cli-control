name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Python sdist + wheel
        working-directory: python
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Build AssetLib zip
        run: |
          mkdir -p dist-assetlib
          # AssetLib expects addons/<plugin>/ inside the zip root
          zip -r "dist-assetlib/godot-cli-control-${GITHUB_REF_NAME:-dev}.zip" \
            addons/godot_cli_control \
            -x '**/__pycache__/*' '**/.DS_Store'

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: assetlib-zip
          path: dist-assetlib/*.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            python/dist/*
            dist-assetlib/*.zip

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - name: Publish to PyPI
        # Skip silently if no token configured yet — keeps the workflow green
        # until a maintainer adds PYPI_API_TOKEN.
        if: ${{ env.PYPI_API_TOKEN != '' }}
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload --username __token__ --password "$PYPI_API_TOKEN" dist/*
