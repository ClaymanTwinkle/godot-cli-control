name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # hatch-vcs reads version from git tags

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Python sdist + wheel
        # Must run BEFORE the plugin.cfg sed below — hatch-vcs flags any
        # working-tree edit as "dirty" and emits a PEP 440 local version
        # like 0.1.4.dev0+g142591da6.d20260428, which PyPI rejects.
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Sync plugin.cfg version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VER="${GITHUB_REF_NAME#v}"
          sed -i "s/^version=.*/version=\"$VER\"/" addons/godot_cli_control/plugin.cfg
          grep '^version=' addons/godot_cli_control/plugin.cfg

      - name: Build AssetLib zip
        run: |
          mkdir -p dist-assetlib
          # AssetLib expects addons/<plugin>/ inside the zip root
          zip -r "dist-assetlib/godot-cli-control-${GITHUB_REF_NAME:-dev}.zip" \
            addons/godot_cli_control \
            -x '**/__pycache__/*' '**/.DS_Store'

      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: assetlib-zip
          path: dist-assetlib/*.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
            dist-assetlib/*.zip

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write   # OIDC for PyPI Trusted Publishers
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
